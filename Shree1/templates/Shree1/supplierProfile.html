{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Settings - Supplier | SHREE</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="{% static 'Shree1/css/supplierprofile.css' %}"
    />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="logo-section">
          <img
            src="{% static 'Shree1/images/logo_img.jpeg' %}"
            alt="SHREE Logo"
            class="nav-logo-file"
          />
          <div>
            <h2 class="logo-name">SHREE</h2>
            <p class="logo-tagline">
              Smart Hostel Record & Employee Evaluation
            </p>
          </div>
        </div>
        <nav class="nav-menu">
          <a href="{% url 'supplier_dashboard' %}" class="nav-item">
            <i class="fa-solid fa-table-cells-large"></i> Dashboard
          </a>
          <a href="{% url 'supplier_profile' %}" class="nav-item active">
            <i class="fa-regular fa-user"></i> Profile
          </a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="top-header">
          <div class="user-info">
            <span class="user-name">{{ username }}</span>
            <span class="user-role">{{ role }}</span>
          </div>
          <a href="{% url 'logout' %}" class="logout-link">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </a>
        </header>

        <section class="page-header">
          <h1>Profile Settings</h1>
          <p>Manage your account information</p>
        </section>

        <div class="profile-card">
          <form method="POST"  id="profileForm">
             {% csrf_token %}
            <div class="form-grid">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" value="{{ username }}" class="form-control" disabled/>
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ email }}" class="form-control" />
              </div>
              <div class="form-group">
                <label>Phone Number</label>
                <input type="text"  name="phone" value="{{ phone }}"  class="form-control" />
              </div>
              <div class="form-group">
                <label>Employee ID</label>
                <input type="text" value="{{ employee_id }}" class="form-control" disabled/>
              </div>
  
        
            <div class="form-group" style="grid-column: span 2; text-align:center; margin-top:20px;">
            <button type="submit" class="btn btn-primary">
             Save Changes
            </button>
          </div>
         </div>
          </form>

          </div>
        </div>
      </main>
    </div>
    <script src="{% static 'Shree1/js/supplier_profile.js' %}"></script>
  </body>
</html>
